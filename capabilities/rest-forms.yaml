naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua REST API — Forms
  description: 'Oracle Eloqua REST API — Forms. 7 operations. Lead operation: Oracle Eloqua Create a form. Self-contained
    Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Forms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-forms
    baseUri: https://secure.p01.eloqua.com/API/REST/2.0
    description: Oracle Eloqua REST API — Forms business capability. Self-contained, no shared references.
    resources:
    - name: assets-form
      path: /assets/form
      operations:
      - name: createform
        method: POST
        description: Oracle Eloqua Create a form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-form-id
      path: /assets/form/{id}
      operations:
      - name: getform
        method: GET
        description: Oracle Eloqua Retrieve a form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateform
        method: PUT
        description: Oracle Eloqua Update a form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteform
        method: DELETE
        description: Oracle Eloqua Delete a form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-forms
      path: /assets/forms
      operations:
      - name: listforms
        method: GET
        description: Oracle Eloqua List forms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-form-id
      path: /data/form/{id}
      operations:
      - name: getformdata
        method: GET
        description: Oracle Eloqua Retrieve form submission data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createformdata
        method: POST
        description: Oracle Eloqua Submit form data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-forms-rest
    port: 8080
    description: REST adapter for Oracle Eloqua REST API — Forms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/assets/form
      name: assets-form
      description: REST surface for assets-form.
      operations:
      - method: POST
        name: createform
        description: Oracle Eloqua Create a form
        call: rest-forms.createform
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/form/{id}
      name: assets-form-id
      description: REST surface for assets-form-id.
      operations:
      - method: GET
        name: getform
        description: Oracle Eloqua Retrieve a form
        call: rest-forms.getform
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateform
        description: Oracle Eloqua Update a form
        call: rest-forms.updateform
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteform
        description: Oracle Eloqua Delete a form
        call: rest-forms.deleteform
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/forms
      name: assets-forms
      description: REST surface for assets-forms.
      operations:
      - method: GET
        name: listforms
        description: Oracle Eloqua List forms
        call: rest-forms.listforms
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/form/{id}
      name: data-form-id
      description: REST surface for data-form-id.
      operations:
      - method: GET
        name: getformdata
        description: Oracle Eloqua Retrieve form submission data
        call: rest-forms.getformdata
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createformdata
        description: Oracle Eloqua Submit form data
        call: rest-forms.createformdata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-forms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Eloqua REST API — Forms. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: oracle-eloqua-create-form
      description: Oracle Eloqua Create a form
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-forms.createform
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-form
      description: Oracle Eloqua Retrieve a form
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-forms.getform
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-update-form
      description: Oracle Eloqua Update a form
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-forms.updateform
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-delete-form
      description: Oracle Eloqua Delete a form
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-forms.deleteform
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-list-forms
      description: Oracle Eloqua List forms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-forms.listforms
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-form-submission
      description: Oracle Eloqua Retrieve form submission data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-forms.getformdata
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-submit-form-data
      description: Oracle Eloqua Submit form data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-forms.createformdata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua Bulk API — Activity Imports
  description: 'Oracle Eloqua Bulk API — Activity Imports. 2 operations. Lead operation: Oracle Eloqua Create an activity
    import definition. Self-contained Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Activity Imports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bulk-activity-imports
    baseUri: https://secure.p01.eloqua.com/API/Bulk/2.0
    description: Oracle Eloqua Bulk API — Activity Imports business capability. Self-contained, no shared references.
    resources:
    - name: activities-imports
      path: /activities/imports
      operations:
      - name: createactivityimport
        method: POST
        description: Oracle Eloqua Create an activity import definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: activities-imports-id-data
      path: /activities/imports/{id}/data
      operations:
      - name: pushactivityimportdata
        method: POST
        description: Oracle Eloqua Push data to an activity import
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: bulk-activity-imports-rest
    port: 8080
    description: REST adapter for Oracle Eloqua Bulk API — Activity Imports. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/activities/imports
      name: activities-imports
      description: REST surface for activities-imports.
      operations:
      - method: POST
        name: createactivityimport
        description: Oracle Eloqua Create an activity import definition
        call: bulk-activity-imports.createactivityimport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/activities/imports/{id}/data
      name: activities-imports-id-data
      description: REST surface for activities-imports-id-data.
      operations:
      - method: POST
        name: pushactivityimportdata
        description: Oracle Eloqua Push data to an activity import
        call: bulk-activity-imports.pushactivityimportdata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bulk-activity-imports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Eloqua Bulk API — Activity Imports. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: oracle-eloqua-create-activity-import
      description: Oracle Eloqua Create an activity import definition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bulk-activity-imports.createactivityimport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-push-data-activity
      description: Oracle Eloqua Push data to an activity import
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bulk-activity-imports.pushactivityimportdata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

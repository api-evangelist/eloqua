naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua REST API — Programs
  description: 'Oracle Eloqua REST API — Programs. 8 operations. Lead operation: Oracle Eloqua Create a program. Self-contained
    Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Programs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:

  - type: http
    namespace: rest-programs
    baseUri: https://secure.p01.eloqua.com/API/REST/2.0
    description: Oracle Eloqua REST API — Programs business capability. Self-contained, no shared references.
    resources:
    - name: assets-program
      path: /assets/program
      operations:
      - name: createprogram
        method: POST
        description: Oracle Eloqua Create a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-program-active-id
      path: /assets/program/active/{id}
      operations:
      - name: activateprogram
        method: POST
        description: Oracle Eloqua Activate a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-program-draft-id
      path: /assets/program/draft/{id}
      operations:
      - name: deactivateprogram
        method: POST
        description: Oracle Eloqua Deactivate a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-program-pause-id
      path: /assets/program/pause/{id}
      operations:
      - name: pauseprogram
        method: POST
        description: Oracle Eloqua Pause a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-program-id
      path: /assets/program/{id}
      operations:
      - name: getprogram
        method: GET
        description: Oracle Eloqua Retrieve a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateprogram
        method: PUT
        description: Oracle Eloqua Update a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteprogram
        method: DELETE
        description: Oracle Eloqua Delete a program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-programs
      path: /assets/programs
      operations:
      - name: listprograms
        method: GET
        description: Oracle Eloqua List programs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-programs-rest
    port: 8080
    description: REST adapter for Oracle Eloqua REST API — Programs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/assets/program
      name: assets-program
      description: REST surface for assets-program.
      operations:
      - method: POST
        name: createprogram
        description: Oracle Eloqua Create a program
        call: rest-programs.createprogram
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/program/active/{id}
      name: assets-program-active-id
      description: REST surface for assets-program-active-id.
      operations:
      - method: POST
        name: activateprogram
        description: Oracle Eloqua Activate a program
        call: rest-programs.activateprogram
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/program/draft/{id}

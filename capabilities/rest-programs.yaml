      operations:
      - method: POST
        name: pauseprogram
        description: Oracle Eloqua Pause a program
        call: rest-programs.pauseprogram
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/program/{id}
      name: assets-program-id
      description: REST surface for assets-program-id.
      operations:
      - method: GET
        name: getprogram
        description: Oracle Eloqua Retrieve a program
        call: rest-programs.getprogram
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateprogram
        description: Oracle Eloqua Update a program
        call: rest-programs.updateprogram
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteprogram

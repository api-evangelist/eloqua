naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua REST API — Users
  description: 'Oracle Eloqua REST API — Users. 5 operations. Lead operation: Oracle Eloqua Retrieve current user. Self-contained
    Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-users
    baseUri: https://secure.p01.eloqua.com/API/REST/2.0
    description: Oracle Eloqua REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: system-user-current
      path: /system/user/current
      operations:
      - name: getcurrentuser
        method: GET
        description: Oracle Eloqua Retrieve current user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: system-user-id
      path: /system/user/{id}
      operations:
      - name: getuser
        method: GET
        description: Oracle Eloqua Retrieve a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateuser
        method: PUT
        description: Oracle Eloqua Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Oracle Eloqua Delete a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: system-users
      path: /system/users
      operations:
      - name: listusers
        method: GET
        description: Oracle Eloqua List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-users-rest
    port: 8080
    description: REST adapter for Oracle Eloqua REST API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/system/user/current
      name: system-user-current
      description: REST surface for system-user-current.
      operations:
      - method: GET
        name: getcurrentuser
        description: Oracle Eloqua Retrieve current user
        call: rest-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/system/user/{id}
      name: system-user-id
      description: REST surface for system-user-id.
      operations:
      - method: GET
        name: getuser
        description: Oracle Eloqua Retrieve a user
        call: rest-users.getuser
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: Oracle Eloqua Update a user
        call: rest-users.updateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Oracle Eloqua Delete a user
        call: rest-users.deleteuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/system/users
      name: system-users
      description: REST surface for system-users.
      operations:
      - method: GET
        name: listusers
        description: Oracle Eloqua List users
        call: rest-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Eloqua REST API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: oracle-eloqua-retrieve-current-user
      description: Oracle Eloqua Retrieve current user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-user
      description: Oracle Eloqua Retrieve a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.getuser
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-update-user
      description: Oracle Eloqua Update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-users.updateuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-delete-user
      description: Oracle Eloqua Delete a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-users.deleteuser
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-list-users
      description: Oracle Eloqua List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.listusers
      outputParameters:
      - type: object
        mapping: $.

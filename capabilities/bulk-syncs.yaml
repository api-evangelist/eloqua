    namespace: bulk-syncs
    baseUri: https://secure.p01.eloqua.com/API/Bulk/2.0
    description: Oracle Eloqua Bulk API — Syncs business capability. Self-contained, no shared references.
    resources:
    - name: syncs
      path: /syncs
      operations:
      - name: listsyncs
        method: GET
        description: Oracle Eloqua List syncs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsync
        method: POST
        description: Oracle Eloqua Create a sync
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: syncs-id
      path: /syncs/{id}
      operations:
      - name: getsync
        method: GET
        description: Oracle Eloqua Retrieve a sync
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: syncs-id-data
      path: /syncs/{id}/data
      operations:
      - name: getsyncdata
        method: GET
        description: Oracle Eloqua Retrieve sync data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesyncdata
        method: DELETE
        description: Oracle Eloqua Delete sync data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: syncs-id-logs
      path: /syncs/{id}/logs

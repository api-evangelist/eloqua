      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bulk-syncs.getsynclogs
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-sync-rejects
      description: Oracle Eloqua Retrieve sync rejects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bulk-syncs.getsyncrejects
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua Bulk API — Account Fields
  description: 'Oracle Eloqua Bulk API — Account Fields. 1 operations. Lead operation: Oracle Eloqua List account fields.
    Self-contained Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Account Fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bulk-account-fields
    baseUri: https://secure.p01.eloqua.com/API/Bulk/2.0
    description: Oracle Eloqua Bulk API — Account Fields business capability. Self-contained, no shared references.
    resources:
    - name: accounts-fields
      path: /accounts/fields
      operations:
      - name: listaccountfields
        method: GET
        description: Oracle Eloqua List account fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: bulk-account-fields-rest
    port: 8080
    description: REST adapter for Oracle Eloqua Bulk API — Account Fields. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/fields
      name: accounts-fields
      description: REST surface for accounts-fields.
      operations:
      - method: GET
        name: listaccountfields
        description: Oracle Eloqua List account fields
        call: bulk-account-fields.listaccountfields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bulk-account-fields-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Eloqua Bulk API — Account Fields. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: oracle-eloqua-list-account-fields
      description: Oracle Eloqua List account fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bulk-account-fields.listaccountfields
      outputParameters:
      - type: object
        mapping: $.

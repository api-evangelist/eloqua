naftiko: 1.0.0-alpha2
info:
  label: Oracle Eloqua REST API — Emails
  description: 'Oracle Eloqua REST API — Emails. 7 operations. Lead operation: Oracle Eloqua Create an email. Self-contained
    Naftiko capability covering one Eloqua business surface.'
  tags:
  - Eloqua
  - Emails
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELOQUA_API_KEY: ELOQUA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-emails
    baseUri: https://secure.p01.eloqua.com/API/REST/2.0
    description: Oracle Eloqua REST API — Emails business capability. Self-contained, no shared references.
    resources:
    - name: assets-email
      path: /assets/email
      operations:
      - name: createemail
        method: POST
        description: Oracle Eloqua Create an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-email-deployment
      path: /assets/email/deployment
      operations:
      - name: createemaildeployment
        method: POST
        description: Oracle Eloqua Create an email deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assets-email-deployment-id
      path: /assets/email/deployment/{id}
      operations:
      - name: getemaildeployment
        method: GET
        description: Oracle Eloqua Retrieve an email deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-email-id
      path: /assets/email/{id}
      operations:
      - name: getemail
        method: GET
        description: Oracle Eloqua Retrieve an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: noMergeContent
          in: query
          type: boolean
          description: Whether email components are dynamically populated
      - name: updateemail
        method: PUT
        description: Oracle Eloqua Update an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteemail
        method: DELETE
        description: Oracle Eloqua Delete an email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-emails
      path: /assets/emails
      operations:
      - name: listemails
        method: GET
        description: Oracle Eloqua List emails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELOQUA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-emails-rest
    port: 8080
    description: REST adapter for Oracle Eloqua REST API — Emails. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/assets/email
      name: assets-email
      description: REST surface for assets-email.
      operations:
      - method: POST
        name: createemail
        description: Oracle Eloqua Create an email
        call: rest-emails.createemail
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/email/deployment
      name: assets-email-deployment
      description: REST surface for assets-email-deployment.
      operations:
      - method: POST
        name: createemaildeployment
        description: Oracle Eloqua Create an email deployment
        call: rest-emails.createemaildeployment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/email/deployment/{id}
      name: assets-email-deployment-id
      description: REST surface for assets-email-deployment-id.
      operations:
      - method: GET
        name: getemaildeployment
        description: Oracle Eloqua Retrieve an email deployment
        call: rest-emails.getemaildeployment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/email/{id}
      name: assets-email-id
      description: REST surface for assets-email-id.
      operations:
      - method: GET
        name: getemail
        description: Oracle Eloqua Retrieve an email
        call: rest-emails.getemail
        with:
          noMergeContent: rest.noMergeContent
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateemail
        description: Oracle Eloqua Update an email
        call: rest-emails.updateemail
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteemail
        description: Oracle Eloqua Delete an email
        call: rest-emails.deleteemail
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/emails
      name: assets-emails
      description: REST surface for assets-emails.
      operations:
      - method: GET
        name: listemails
        description: Oracle Eloqua List emails
        call: rest-emails.listemails
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-emails-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Eloqua REST API — Emails. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: oracle-eloqua-create-email
      description: Oracle Eloqua Create an email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-emails.createemail
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-create-email-deployment
      description: Oracle Eloqua Create an email deployment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-emails.createemaildeployment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-email-deployment
      description: Oracle Eloqua Retrieve an email deployment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-emails.getemaildeployment
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-retrieve-email
      description: Oracle Eloqua Retrieve an email
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-emails.getemail
      with:
        noMergeContent: tools.noMergeContent
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-update-email
      description: Oracle Eloqua Update an email
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-emails.updateemail
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-delete-email
      description: Oracle Eloqua Delete an email
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-emails.deleteemail
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-eloqua-list-emails
      description: Oracle Eloqua List emails
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-emails.listemails
      outputParameters:
      - type: object
        mapping: $.

aid: eloqua
name: Oracle Eloqua
description: >-
  Oracle Eloqua is a marketing automation platform that provides tools for
  lead management, email marketing, and marketing campaign management through
  comprehensive REST APIs. It enables marketing teams to create, execute, and
  measure the effectiveness of marketing programs and campaigns.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:

aid: eloqua
name: Oracle Eloqua
description: Oracle Eloqua is a marketing automation platform that provides tools for lead management, email marketing, and
  marketing campaign management through comprehensive REST APIs. It enables marketing teams to create, execute, and measure
  the effectiveness of marketing programs and campaigns.

        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/orderBy'
      responses:
        '200':
          description: Successfully retrieved forms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResultForm'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /assets/form:
    post:
      operationId: createForm
      summary: Oracle Eloqua Create a form
      description: >-
        Create a new form asset.
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Form'
      responses:
        '201':
          description: Form created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /assets/form/{id}:
    get:
      operationId: getForm
      summary: Oracle Eloqua Retrieve a form
      description: >-
        Retrieve a single form asset by its identifier.
      tags:
        - Forms
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/depth'
      responses:
        '200':
          description: Successfully retrieved form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '401':
          description: Unauthorized
        '404':
          description: Form not found
    put:
      operationId: updateForm
      summary: Oracle Eloqua Update a form
      description: >-
        Update an existing form asset.
      tags:
        - Forms
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Form'
      responses:
        '200':
          description: Successfully updated form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '400':

        '401':
          description: Unauthorized
        '404':
          description: Form not found
  /data/form/{id}:
    get:
      operationId: getFormData
      summary: Oracle Eloqua Retrieve form submission data
      description: >-
        Retrieve submission data for a specific form.
      tags:
        - Forms
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Successfully retrieved form data
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      $ref: '#/components/schemas/FormData'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
        '401':
          description: Unauthorized
        '404':
          description: Form not found
    post:
      operationId: createFormData
      summary: Oracle Eloqua Submit form data
      description: >-
        Create a new form submission for the specified form.
      tags:
        - Forms
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormData'
      responses:
        '201':
          description: Form data submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormData'
        '400':
          description: Bad request
        '401':
          description: Unauthorized

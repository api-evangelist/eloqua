components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using company\username and password
        in the format CompanyName\Username.
    oAuth2:
      type: oauth2
      description: OAuth 2.0 authorization code flow
      flows:
        authorizationCode:
          authorizationUrl: https://login.eloqua.com/auth/oauth2/authorize
          tokenUrl: https://login.eloqua.com/auth/oauth2/token
          scopes:
            full: Full access to all Eloqua resources
  parameters:
    id:
      name: id
      in: path
      required: true
      description: The unique identifier of the resource
      schema:
        type: string
    count:
      name: count
      in: query
      description: Maximum number of entities to return (1-1000)
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    depth:
      name: depth
      in: query
      description: Level of detail returned for the entity
      schema:
        type: string
        enum:
          - minimal
          - partial
          - complete
        default: minimal
    page:
      name: page
      in: query
      description: Page number to return (starts at 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    search:
      name: search
      in: query
      description: Search criteria for filtering results
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      description: Field to sort results by (e.g., createdAt DESC)
      schema:
        type: string
    lastUpdatedAt:
      name: lastUpdatedAt
      in: query
      description: Unix timestamp to filter entities updated after this time
      schema:
        type: integer
  schemas:
    Contact:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the contact
          readOnly: true
        name:
          type: string
          description: Contact display name
        firstName:
          type: string
          description: Contact first name
        lastName:
          type: string
          description: Contact last name
        emailAddress:
          type: string
          format: email
          description: Contact email address
        title:
          type: string
          description: Contact job title
        accountId:
          type: string
          description: Associated account identifier
          readOnly: true
        accountName:
          type: string
          description: Associated account name
        address1:
          type: string
          description: Primary address line
        address2:
          type: string
          description: Secondary address line
        city:
          type: string
          description: City
        province:
          type: string
          description: State or province
        postalCode:
          type: string
          description: Postal or ZIP code
        country:
          type: string
          description: Country
        businessPhone:
          type: string
          description: Business phone number
        mobilePhone:
          type: string
          description: Mobile phone number
        isSubscribed:
          type: string
          description: Email subscription status
        isBounced:
          type: string
          description: Whether the contact email has bounced
        fieldValues:
          type: array
          description: Custom field values
          items:
            $ref: '#/components/schemas/FieldValue'
        createdAt:
          type: string
          description: Creation timestamp (Unix time)
          readOnly: true
        updatedAt:
          type: string
          description: Last update timestamp (Unix time)
          readOnly: true
        createdBy:
          type: string
          description: User who created the contact
          readOnly: true
        updatedBy:
          type: string
          description: User who last updated the contact
          readOnly: true
        depth:
          type: string
          description: Level of detail returned
          readOnly: true
        folderId:
          type: string
          description: Containing folder identifier
          readOnly: true
        type:
          type: string
          description: Asset type in Eloqua
          readOnly: true
    Account:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the account
          readOnly: true
        name:
          type: string
          description: Account name
        companyName:
          type: string
          description: Company name
        address1:
          type: string
          description: Primary address line
        city:
          type: string
          description: City
        province:
          type: string
          description: State or province
        postalCode:
          type: string
          description: Postal or ZIP code
        country:
          type: string
          description: Country
        businessPhone:
          type: string
          description: Business phone number
        fieldValues:
          type: array
          description: Custom field values
          items:
            $ref: '#/components/schemas/FieldValue'
        createdAt:
          type: string
          description: Creation timestamp (Unix time)
          readOnly: true
        updatedAt:
          type: string
          description: Last update timestamp (Unix time)
          readOnly: true
        depth:
          type: string
          description: Level of detail returned
          readOnly: true
        type:
          type: string
          description: Asset type in Eloqua
          readOnly: true
    Campaign:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the campaign
          readOnly: true
        name:
          type: string
          description: Campaign name
        description:
          type: string
          description: Campaign description
        currentStatus:
          type: string
          enum:
            - Active
            - Draft
            - Scheduled
            - Completed
          description: Current campaign status
          readOnly: true
        campaignCategory:
          type: string
          enum:
            - emailMarketing
            - contact
          description: >-
            Campaign type - emailMarketing for simple campaigns, contact
            for multi-step campaigns
        startAt:
          type: string
          description: Campaign start date (Unix time)
        endAt:
          type: string
          description: Campaign end date (Unix time)
        memberCount:
          type: integer
          description: Number of members entered in the last 90 days
          readOnly: true
        folderId:
          type: string
          description: Containing folder identifier
          readOnly: true
        createdAt:
          type: string
          description: Creation timestamp (Unix time)
          readOnly: true
        updatedAt:
          type: string
          description: Last update timestamp (Unix time)
          readOnly: true
        createdBy:
          type: string
          description: User who created the campaign
          readOnly: true
        updatedBy:
          type: string
          description: User who last updated the campaign
          readOnly: true
        depth:
          type: string
          description: Level of detail returned
          readOnly: true
        type:
          type: string
          description: Asset type in Eloqua
          readOnly: true
    Email:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the email
          readOnly: true
        name:
          type: string
          description: Email name
        description:
          type: string
          description: Email description
        subject:
          type: string
          description: Email subject line
        senderName:
          type: string
          description: Sender name displayed to recipients
        senderEmail:
          type: string
          format: email
          description: Sender email address
        replyToEmail:
          type: string
          format: email
          description: Reply-to email address
        replyToName:
          type: string
          description: Reply-to name
        previewText:
          type: string
          description: Preheader text (max 500 characters)
          maxLength: 500
        htmlContent:
          type: object
          description: HTML content of the email
          properties:
            type:
              type: string
            contentSource:
              type: string
              description: HTML source content
        plainText:
          type: string
          description: Plain text version of the email
        sendPlainTextOnly:
          type: boolean
          description: Whether to send as plain text only
        isTracked:
          type: string
          description: Whether Eloqua tracks interactions
        currentStatus:
          type: string
          description: Current email status
          readOnly: true
        renderMode:
          type: string
          enum:
            - fixed
            - flow
          description: Email layout rendering mode
        archived:
          type: boolean
          description: Whether the email is archived
        folderId:
          type: string
          description: Containing folder identifier
          readOnly: true
        createdAt:
          type: string
          description: Creation timestamp (Unix time)
          readOnly: true
        updatedAt:
          type: string
          description: Last update timestamp (Unix time)
          readOnly: true
        createdBy:
          type: string
          description: User who created the email
          readOnly: true
        updatedBy:
          type: string
          description: User who last updated the email
          readOnly: true
        depth:
          type: string
          description: Level of detail returned
          readOnly: true
        type:
          type: string
          description: Asset type in Eloqua
          readOnly: true
    EmailDeployment:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the deployment
          readOnly: true
        name:
          type: string
          description: Deployment name
        email:
          type: object
          description: The email asset to deploy
          properties:
            id:
              type: string
              description: Email asset identifier
            type:
              type: string
        contactList:
          type: object
          description: Target contact list
          properties:
            id:
              type: string
              description: Contact list identifier
            type:
              type: string
        segment:
          type: object
          description: Target contact segment
          properties:
            id:
              type: string
              description: Segment identifier
            type:
              type: string
